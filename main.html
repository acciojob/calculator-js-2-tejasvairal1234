<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Calculator</title>
  </head>
  <body>
    <!-- Write yout code here -->
	  <div id="calculator">
      <div id="display">
        <input type="text" id="input" readonly>
      </div>
      <div id="button">
        <button class="btns" id="clear">C</button>
        <button class="btn btns">/</button>
        <button class="btn btns">*</button>
        <button class="btns" id="back">--</button>
        <button class="btn btns">7</button>
        <button class="btn btns">8</button>
        <button class="btn btns">9</button>
        <button class="btn btns">-</button>
        <button class="btn btns">4</button>
        <button class="btn btns">5</button>
        <button class="btn btns">6</button>
        <button class="btn btns">+</button>
        <button class="btn btns">1</button>
        <button class="btn btns">2</button>
        <button class="btn btns">3</button>
        <button class="btn btns">.</button>
        <button class="btn btns">(</button>
        <button class="btn btns">0</button>
        <button class="btn btns">)</button>
        <button class="btns" id="final">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
